# Wave 13 Phase 5 — nginx reverse proxy for the windyfly-gateway.
#
# Pre-certbot: listens :80 and forwards to the Bun gateway on 127.0.0.1:8080.
# Certbot (FIRE 4) rewrites this to add :443 + LE cert and installs an
# HTTP→HTTPS redirect on :80.
#
# SSE notes: /hatch/remote streams server-sent events. We MUST disable
# proxy_buffering and extend proxy_read_timeout; otherwise the Electron
# consumer sees events batched at the end of the run instead of live.

server {
    listen 80;
    listen [::]:80;
    server_name fly.windyword.ai;

    # Cloudflare is proxied=false for FIRE 4 (so certbot's HTTP-01
    # validation reaches this server directly). Later phases can flip
    # proxied=true after cert renewal is handled out-of-band.

    access_log /var/log/nginx/windyfly.access.log;
    error_log  /var/log/nginx/windyfly.error.log warn;

    # Health check — short path so Cloudflare / monitoring don't eat SSE buffers.
    location = /api/health {
        proxy_pass http://127.0.0.1:8080/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    # Server-Sent Events — must disable every form of buffering, and
    # keep the connection open long enough for the full hatch ceremony
    # (13 events, Eternitas + Mail + Cloud + Matrix fan-out, ~30s
    # under load).
    location = /hatch/remote {
        proxy_pass http://127.0.0.1:8080/hatch/remote;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE essentials
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        # 5-minute ceiling — long enough for a sluggish ecosystem
        # round-trip, short enough that a dead client's TCP socket
        # is reaped before next day.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Everything else — plain reverse proxy.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
