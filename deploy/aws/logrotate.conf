# Windy Fly — audit log rotation.
# Install at /etc/logrotate.d/windyfly on any Linux deployment.
# Adjust the path if the agent lives somewhere other than
# /home/windyfly/data/.

/home/windyfly/data/audit/bot_key_usage.jsonl {
    size 100M
    rotate 7
    compress
    missingok
    notifempty
    copytruncate
    # copytruncate avoids a race with the agent still writing.
    # The agent's audit writer uses append-mode with an fcntl lock,
    # so the truncated file is safe to continue writing into.
}
