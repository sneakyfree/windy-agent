[agent]
name = "Windy Fly"
default_model = "kimi-k2.5"
max_context_tokens = 8000
max_response_tokens = 2000
temperature = 0.7

[memory]
db_path = "data/windyfly.db"
max_episodes_per_context = 20
max_nodes_per_context = 10

[personality]
soul_path = "SOUL.md"
preset = "buddy"
humor_level = 7
formality = 3
proactivity = 5
verbosity = 5
reasoning_depth = 6
autonomy = 3
epistemic_strictness = 5
warmth = 9
auto_checkin = false        # Daily check-in with to-do summary (opt-in)

[costs]
daily_budget_usd = 5.0
monthly_budget_usd = 50.0
warn_at_percent = 80

[matrix]
homeserver = "https://chat.windychat.ai"
bot_user = "@windyfly:chat.windychat.ai"

[windy_api]
base_url = "http://localhost:8098"

[ecosystem]
eternitas_url = "https://eternitas.ai"
windy_mail_url = "https://api.windymail.ai"
matrix_homeserver = "https://chat.windychat.ai"
windy_cloud_url = "https://cloud.windycloud.com"
windy_pro_url = "https://windyword.ai"

[cloud]
auto_backup = true
backup_interval = "24h"

[updates]
auto_check = true           # Check for updates on startup
auto_install = false        # Auto-install updates (opt-in)
check_interval = 86400      # Seconds between checks (24h)
