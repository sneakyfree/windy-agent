name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - run: uv run ruff check src/
      - run: uv run pytest tests/ -v --tb=short

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build
      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-image:
    name: Build and push runtime image to GHCR
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write  # required for ghcr.io push
    steps:
      - uses: actions/checkout@v4

      - name: Resolve metadata
        id: meta
        run: |
          # Tag is e.g. v0.5.2 — strip the leading v for the image
          # version label. The git tag itself stays as the GHCR tag.
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/windy-fly:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/windy-fly:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/windy-fly:latest
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
