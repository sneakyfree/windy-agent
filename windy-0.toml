# Windy 0 — Grant's personal dog-food instance of windy-agent.
# Runs standalone on Telegram with Z.AI GLM as the brain.
# See PR feat(windy-0) for context.

[agent]
name = "Windy 0"
default_model = "glm-4.7"
active_provider = "zai"
max_context_tokens = 8000
max_response_tokens = 2000
temperature = 0.7

[memory]
db_path = "data/windy-0.db"
max_episodes_per_context = 20
max_nodes_per_context = 10

[personality]
soul_path = "SOUL.md"
preset = "buddy"
humor_level = 7
formality = 3
proactivity = 5
verbosity = 5
reasoning_depth = 6
autonomy = 3
epistemic_strictness = 5
warmth = 9
auto_checkin = false

[costs]
daily_budget_usd = 5.0
monthly_budget_usd = 50.0
warn_at_percent = 80

[telegram]
dm_policy = "pairing"

[updates]
auto_check = false
auto_install = false
