# Windy Fly compose stack — for local dev + single-host deploys.
# Production fleet deploys go through the GHCR image directly.
#
# Quick start:
#   1. Have ~/.windy/windy-0.env populated (real bot env)
#   2. docker compose up --build
#   3. Bot polls Telegram and (if enabled) listens on :3000 for the
#      gateway dashboard. /version inside Telegram reports the SHA.
#
# Note: the obsolete `version: '3.8'` directive was removed — Compose
# v2 ignores it with a warning.
#
# Explicit project name per ADR-046 (compose project naming discipline).
name: windyfly-dev

services:
  agent:
    build:
      context: .
      args:
        # Default to 'dev' when building locally; CI (release.yml)
        # overrides these with real values at image-build time.
        GIT_SHA: ${GIT_SHA:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        VERSION: ${VERSION:-dev}
    image: windy-fly:${VERSION:-dev}
    ports:
      - "3000:3000"
    # env_file is the cleaner pattern — pulls in ONLY what the bot
    # needs (TELEGRAM_BOT_TOKEN, AGENT_OWNER_TELEGRAM_ID,
    # ANTHROPIC_API_KEY, etc.) without enumerating speculative
    # services in the compose file.
    env_file:
      - ${WINDY_ENV_FILE:-/home/grantwhitmer/.windy/windy-0.env}
    environment:
      # Defaults for fields the env_file might not set.
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-haiku-4-5-20251001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - agent-data:/app/data
      # Mount the soul + config separately so they persist across
      # image updates. Override WINDY_SOUL_DIR for non-default paths.
      - ${WINDY_SOUL_DIR:-./soul}:/app/soul:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  agent-data:
